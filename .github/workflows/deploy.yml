name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. Create a clean 'dist' folder with only the website files
      - name: Prepare deployment files
        run: mkdir -p dist && cp -r index.html css js images dist/

      # 2. Delete old files from the server (The "Clean Slate" step)
      # This prevents "old files not updating" issues
      - name: Clean up old files
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_IP }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          script: |
            rm -rf /home/u358740591/public_html/index.html
            rm -rf /home/u358740591/public_html/css
            rm -rf /home/u358740591/public_html/js
            rm -rf /home/u358740591/public_html/images

      # 3. Upload the new clean files
      - name: Upload files via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_IP }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          source: "dist"
          target: "/home/u358740591/public_html"
          strip_components: 1
