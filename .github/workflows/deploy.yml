name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- NEW STEP: Create a clean folder with only your website files ---
      - name: Prepare deployment files
        run: mkdir -p dist && cp -r index.html css js images dist/

      - name: Copy files to Hostinger
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_IP }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          source: "dist"             # We only upload the clean 'dist' folder
          target: "/home/u358740591/public_html"
          
          # ADD THIS: Removes the 'dist' folder name so files land directly in public_html
          strip_components: 1        
          
          overwrite: true           # Force overwrite old files
