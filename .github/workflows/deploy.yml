name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy files to Hostinger
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_IP }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          source: "."
          target: "/home/u358740591/public_html"
          
          # ADD THESE TWO LINES:
          overwrite: true     # Forces files to update even if they exist
          strip_components: 0  # Ensures files land directly in public_html
