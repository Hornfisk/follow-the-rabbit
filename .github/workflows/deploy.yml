name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare deployment files
        run: mkdir -p dist && cp -r index.html css js images dist/

      - name: Copy files to Hostinger
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOSTINGER_IP }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          source: "dist"
          target: "/home/u358740591/public_html"
          strip_components: 1
          overwrite: true

      # --- ADD THIS STEP ---
      - name: Fix Permissions on Hostinger
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOSTINGER_IP }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 65002
          script: |
            chmod -R 755 /home/u358740591/public_html
            find /home/u358740591/public_html -type f -exec chmod 644 {} \;
